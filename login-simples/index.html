<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- ==================== META TAGS ==================== -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Simples | Fábrica de Modelos</title>
  <meta name="description" content="Tela de login simples e profissional. Modelo pronto para uso em projetos web.">
  <meta name="author" content="Mateus Ernandes Turet Ribeiro">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Login Simples | Fábrica de Modelos">
  <meta property="og:description" content="Tela de login profissional pronta para uso.">
  <meta property="og:type" content="website">

  <!-- CSS Externo -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ==================== CONTEÚDO PRINCIPAL ==================== -->
  <main class="login-page">

    <div class="login-container">

      <!-- Ícone decorativo -->
      <div class="login-icon" aria-hidden="true">🔐</div>

      <!-- Título e subtítulo -->
      <h1 class="login-title">Bem-vindo de volta</h1>
      <p class="login-subtitle">Entre com seus dados para continuar</p>

      <!-- Formulário de login -->
      <form>
        <!-- Campo Email -->
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com" required>
        </div>

        <!-- Campo Senha -->
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Sua senha" required>
        </div>

        <!-- Opções adicionais -->
        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox"> Lembrar-me
          </label>
          <a href="#">Esqueci a senha</a>
        </div>

        <!-- Botão de ação -->
        <button type="submit" class="btn-login">Entrar</button>
      </form>

      <!-- Link para cadastro -->
      <p class="register-link">
        Não tem uma conta? <a href="#">Cadastre-se</a>
      </p>

    </div>

  </main>

</body>
</html>
